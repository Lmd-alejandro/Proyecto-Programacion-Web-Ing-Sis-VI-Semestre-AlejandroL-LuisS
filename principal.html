<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Tutores | MyTeacher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo"><strong>MyTeacher</strong></div>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="principal.html">Buscar tutor</a></li>
            <li><a href="index.html#steps">Como funciona</a></li>
            <li><a href="#" class="btn-login">Convertirse en tutor</a></li>
        </ul>
    </nav>

    <div class="search-header">
        <h1>Buscar tutores</h1>
        <div class="search-bar-container">
            <div class="search-inner">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Busca por nombre de tutor, materia o palabra clave">
            </div>
        </div>
    </div>

    <main class="main-layout">
        <aside class="filters-sidebar">
            <h2>Filtros</h2>
            <div class="filter-section">
                <label>Materias</label>
                <select>
                    <option>Todas las materias</option>
                    <option>Matemáticas</option>
                    <option>Programación</option>
                    <option>Inglés</option>
                </select>
            </div>
            <div class="filter-section">
                <label>Nivel educativo</label>
                <select>
                    <option>Todos los niveles</option>
                    <option>Primaria</option>
                    <option>Secundaria</option>
                    <option>Universitario</option>
                </select>
            </div>
        </aside>

        <section class="tutors-grid-container">
            <div class="tutor-card">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400" alt="Sara">
                <div class="tutor-meta">
                    <h3>Sara Michelle</h3>
                    <p>Barranquilla</p>
                </div>
            </div>

            <div class="tutor-card">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=400" alt="James">
                <div class="tutor-meta">
                    <h3>James Uribe</h3>
                    <p>Soledad</p>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
